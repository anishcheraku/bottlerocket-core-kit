[package]
# "." is not allowed in crate names, but we want a friendlier name for the
# directory and spec file, so we override it below.
name = "ecr-credential-provider-1_30"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
package-name = "ecr-credential-provider-1.30"
releases-url = "https://github.com/kubernetes/cloud-provider-aws/releases"

[[package.metadata.build-package.external-files]]
url = "https://codeload.github.com/kubernetes/cloud-provider-aws/tar.gz/v1.30.10"
path = "cloud-provider-aws-1.30.10.tar.gz"
sha512 = "c63862bb1a59988e29c7aa6a209f30fbce2603ca330c5f2ea2176463b1535ae0e27bbedd34c31e00b0cfbf61569cc86d97bddc7718244029c002ed471909057d"
bundle-modules = [ "go" ]

[build-dependencies]
glibc = { path = "../glibc" }
