[package]
name = "libdbus"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
releases-url = "https://dbus.freedesktop.org/releases/dbus"

# dbus uses the "stable releases use even numbers" versioning scheme
[[package.metadata.build-package.external-files]]
url = "https://dbus.freedesktop.org/releases/dbus/dbus-1.16.2.tar.xz"
sha512 = "5c26f52d85984bb9ae1dde8d7e73921eacbdf020a61ff15f00a4c240cb38a121553ee04bd66e62b28425ff9bc50f4f5e15135166573ac0888332a01a0db1faa2"

[[package.metadata.build-package.external-files]]
url = "https://dbus.freedesktop.org/releases/dbus/dbus-1.16.2.tar.xz.asc"
sha512 = "db5ba86498f4f90c4984f43039bb1f0e71177baa4a65d7dadb547aec897fd99275f9aacbf72e404ae1ba6d3825262be506f12c144e3474fc4bf3ce2f53dc9fe4"

[build-dependencies]
glibc = { path = "../glibc" }
libcap = { path = "../libcap" }
libexpat = { path = "../libexpat" }
