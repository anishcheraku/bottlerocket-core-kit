[package]
name = "nvidia-container-toolkit"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
releases-url = "https://github.com/NVIDIA/nvidia-container-toolkit/releases"

# Should match the version of the libnvidia-container package
[[package.metadata.build-package.external-files]]
url = "https://github.com/NVIDIA/nvidia-container-toolkit/archive/v1.18.1/nvidia-container-toolkit-1.18.1.tar.gz"
sha512 = "1c0488c77e9e54e156ccc6ba2c7bd1cdf93c85dd88b6fb2307a6499f572e626254c3c1a683dda843da533fef919b15674c2032bb2b4a6054c0a9ac4f64c306dc"

[build-dependencies]
glibc = { path = "../glibc" }
libnvidia-container = { path = "../libnvidia-container" }
