[package]
# "." is not allowed in crate names, but we want a friendlier name for the
# directory and spec file, so we override it below.
name = "ecr-credential-provider-1_29"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
package-name = "ecr-credential-provider-1.29"
releases-url = "https://github.com/kubernetes/cloud-provider-aws/releases"

[[package.metadata.build-package.external-files]]
url = "https://codeload.github.com/kubernetes/cloud-provider-aws/tar.gz/v1.29.8"
path = "cloud-provider-aws-1.29.8.tar.gz"
sha512 = "7330de2e0b5706ce42fff5197037d6e3e209b4b86d75c7397f2df2ec54c0cfc1c73128022e25093a008620d54d8840a65eb880b3375f8eff1410a96bc481cfd9"
bundle-modules = [ "go" ]

[build-dependencies]
glibc = { path = "../glibc" }
