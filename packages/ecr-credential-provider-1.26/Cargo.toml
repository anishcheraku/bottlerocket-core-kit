[package]
# "." is not allowed in crate names, but we want a friendlier name for the
# directory and spec file, so we override it below.
name = "ecr-credential-provider-1_26"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
package-name = "ecr-credential-provider-1.26"
releases-url = "https://github.com/kubernetes/cloud-provider-aws/releases"

[[package.metadata.build-package.external-files]]
url = "https://codeload.github.com/kubernetes/cloud-provider-aws/tar.gz/v1.26.14"
path = "cloud-provider-aws-1.26.14.tar.gz"
sha512 = "c2dbc0b6e7887f1c50c545ce36a129ad9b388b858c50d6d90403c5da8e7ec6f5627a6e9f274af0ad54f65359ff46b79e65a736fd54a01358273c5a66b37a2826"
bundle-modules = [ "go" ]

[build-dependencies]
glibc = { path = "../glibc" }
