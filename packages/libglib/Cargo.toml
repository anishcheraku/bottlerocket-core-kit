[package]
name = "libglib"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
releases-url = "https://download.gnome.org/sources/glib"

# glib uses the "stable releases use even minor numbers" versioning scheme
[[package.metadata.build-package.external-files]]
url = "https://download.gnome.org/sources/glib/2.86/glib-2.86.3.tar.xz"
sha512 = "2b53aba22eef2d21cb40334fe55715bf0ca5009e5e105c462cdedfb45da96cca35e7edc95af27022893832feb5bfc0b0ee554382c8c8f55a2a777b864cfc53ba"

[build-dependencies]
glibc = { path = "../glibc" }
libffi = { path = "../libffi" }
libpcre = { path = "../libpcre" }
libselinux = { path = "../libselinux" }
libz = { path = "../libz" }
util-linux = { path = "../util-linux" }
