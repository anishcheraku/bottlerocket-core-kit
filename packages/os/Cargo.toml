[package]
name = "os"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[package.metadata.build-package]
source-groups = [
    "api",
    "constants",
    "generate-readme",
    "aws-smithy-experimental",
    "bottlerocket-release",
    "metricdog",
    "parse-datetime",
    "pciclient",
    "ghostdog",
    "updater",
    "logdog",
    "models",
    "imdsclient",
    "retry-read",
    "driverdog",
    "cfsignal",
    "bloodhound",
    "xfscli",
    "brush",
]

[lib]
path = "../packages.rs"

[build-dependencies]
glibc = { path = "../glibc" }
