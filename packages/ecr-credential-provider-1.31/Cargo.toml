[package]
# "." is not allowed in crate names, but we want a friendlier name for the
# directory and spec file, so we override it below.
name = "ecr-credential-provider-1_31"
version = "0.1.0"
edition = "2021"
publish = false
build = "../build.rs"

[lib]
path = "../packages.rs"

[package.metadata.build-package]
package-name = "ecr-credential-provider-1.31"
releases-url = "https://github.com/kubernetes/cloud-provider-aws/releases"

[[package.metadata.build-package.external-files]]
url = "https://github.com/kubernetes/cloud-provider-aws/archive/v1.31.9.tar.gz"
path = "cloud-provider-aws-1.31.9.tar.gz"
sha512 = "399faf712fe05cb937ffbb512f2ee95ad33914b30c9500eb1de39e7c7da1259d0deee3122a8796b38e29c8209eee724f2fb9d29cfc0714d1cc5886e52e328bd2"
bundle-modules = [ "go" ]

[build-dependencies]
glibc = { path = "../glibc" }
